name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm for trusted publishing
        run: npm install -g npm@11.16.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm run ready

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          package_version="$(node -p "require('./packages/ui/package.json').version")"
          test "${TAG_NAME}" = "v${package_version}"

      - name: Check whether version already exists
        id: package
        run: |
          package_version="$(node -p "require('./packages/ui/package.json').version")"
          if npm view "@24letters/ui@${package_version}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.package.outputs.exists != 'true'
        run: pnpm publish --filter @24letters/ui --access public --no-git-checks --provenance
