packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
  "@base-ui/react": ^1.6.0
  input-otp: ^1.4.2
  react-resizable-panels: ^4.12.2
  sonner: ^2.0.7
  next-themes: ^0.4.6
  react-day-picker: ^10.0.1
  date-fns: ^4.4.0
  embla-carousel-react: ^8.6.0
  "@shadcn/react": ^0.2.1
  recharts: 3.8.0
  cmdk: ^1.1.1
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
